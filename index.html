<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Sale Beauty</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --magenta: #e90074;
            --magenta-dark: #b8005b;
            --yellow: #fffb00;
            --white: #ffffff;
            --blue: #4a69ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, var(--magenta), var(--magenta-dark));
            color: var(--white);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 4vw;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 3px dashed var(--yellow);
        }

        .logo-area {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5vw;
            font-weight: 900;
            color: var(--white);
            text-shadow: 2px 2px 0px var(--magenta-dark);
            text-transform: uppercase;
        }

        .logo-area span {
            color: var(--yellow);
        }

        .event-date {
            background-color: var(--white);
            color: var(--magenta);
            padding: 1vh 2vw;
            border-radius: 50px;
            font-weight: 800;
            font-size: 2vw;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* MAIN CONTENT */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2vw;
        }

        .status-badge {
            background-color: var(--yellow);
            color: var(--magenta-dark);
            font-size: 2vw;
            font-weight: 800;
            padding: 1vh 3vw;
            border-radius: 50px;
            text-transform: uppercase;
            margin-bottom: 2vh;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 251, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 251, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 251, 0, 0); }
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 6vw;
            font-weight: 900;
            line-height: 1.1;
            margin: 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .promo-detail {
            font-size: 3vw;
            font-weight: 700;
            color: var(--yellow);
            background: var(--blue);
            padding: 1vh 3vw;
            border-radius: 15px;
            margin: 2vh 0 4vh 0;
            border: 3px solid var(--white);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* COUNTDOWN */
        .countdown {
            display: flex;
            gap: 2vw;
        }

        .time-box {
            background: var(--white);
            color: var(--magenta);
            width: 12vw;
            height: 12vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 4px solid var(--yellow);
        }

        .time-box .num {
            font-family: 'Montserrat', sans-serif;
            font-size: 6vw;
            font-weight: 900;
            line-height: 1;
        }

        .time-box .label {
            font-size: 1.5vw;
            font-weight: 700;
            color: var(--magenta-dark);
            text-transform: uppercase;
            margin-top: 5px;
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">FLASH <span>SALE</span></div>
        <div class="event-date">SPESIAL BEAUTY</div>
    </header>

    <main class="main-content">
        <div class="status-badge" id="status-badge">MEMUAT JADWAL...</div>
        
        <h1 class="brand-title" id="brand-title">MENYIAPKAN PROMO</h1>
        <div class="promo-detail" id="promo-detail">SILAKAN TUNGGU</div>

        <div class="countdown">
            <div class="time-box">
                <div class="num" id="hours">00</div>
                <div class="label">Jam</div>
            </div>
            <div class="time-box">
                <div class="num" id="minutes">00</div>
                <div class="label">Menit</div>
            </div>
            <div class="time-box">
                <div class="num" id="seconds">00</div>
                <div class="label">Detik</div>
            </div>
        </div>
    </main>

    <script>
        // Data Jadwal Flash Sale Baru
        const schedules = [
            {
                startH: 8, endH: 12,
                brands: "NIVEA",
                promo: "DISKON 50% SEMUA PRODUK"
            },
            {
                startH: 12, endH: 16,
                brands: "GARNIER",
                promo: "DISKON HINGGA 50% SEMUA PRODUK"
            },
            {
                startH: 16, endH: 19,
                brands: "MAYBELLINE",
                promo: "DISKON HINGGA 50% SEMUA PRODUK"
            },
            {
                startH: 19, endH: 22,
                brands: "L'OREAL",
                promo: "DISKON HINGGA 50% SEMUA PRODUK"
            }
        ];

        function updateDisplay() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const timeInMinutes = currentHour * 60 + currentMinute;

            let targetTime = null;
            let displayStatus = "";
            let displayBrands = "";
            let displayPromo = "";
            let isActive = false;

            // Cek jadwal berdasarkan jam komputer/TV saat ini
            for (let i = 0; i < schedules.length; i++) {
                let startMins = schedules[i].startH * 60;
                let endMins = schedules[i].endH * 60;

                if (timeInMinutes >= startMins && timeInMinutes < endMins) {
                    // Promo sedang berlangsung
                    isActive = true;
                    displayStatus = "🔥 SEDANG BERLANGSUNG! SISA WAKTU: 🔥";
                    displayBrands = schedules[i].brands;
                    displayPromo = schedules[i].promo;
                    
                    targetTime = new Date();
                    targetTime.setHours(schedules[i].endH, 0, 0, 0);
                    break;
                } else if (timeInMinutes < startMins) {
                    // Menunggu promo berikutnya hari ini
                    isActive = false;
                    displayStatus = "⏳ PROMO BERIKUTNYA DIMULAI DALAM: ⏳";
                    displayBrands = schedules[i].brands;
                    displayPromo = schedules[i].promo;
                    
                    targetTime = new Date();
                    targetTime.setHours(schedules[i].startH, 0, 0, 0);
                    break;
                }
            }

            // Jika hari ini sudah lewat jam 22:00, tunggu besok pagi jam 08:00
            if (!targetTime) {
                isActive = false;
                displayStatus = "✨ PROMO HARI INI TELAH SELESAI ✨";
                displayBrands = "KEMBALI BESOK JAM 08.00 Pagi!";
                displayPromo = "SIAP-SIAP UNTUK DISKON SPESIAL";
                
                targetTime = new Date();
                targetTime.setDate(targetTime.getDate() + 1);
                targetTime.setHours(8, 0, 0, 0);
            }

            // Hitung selisih waktu
            const diff = targetTime - now;
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Update Tampilan HTML
            document.getElementById('status-badge').innerText = displayStatus;
            document.getElementById('brand-title').innerText = displayBrands;
            document.getElementById('promo-detail').innerText = displayPromo;

            // Efek visual jika sedang diskon vs menunggu
            if(isActive) {
                document.getElementById('status-badge').style.backgroundColor = "var(--yellow)";
                document.getElementById('status-badge').style.color = "var(--magenta-dark)";
            } else {
                document.getElementById('status-badge').style.backgroundColor = "var(--white)";
                document.getElementById('status-badge').style.color = "var(--magenta)";
            }

            // Memastikan selalu dua digit angka
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');
        }

        // Segarkan halaman setiap 1 detik
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
